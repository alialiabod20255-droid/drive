<!DOCTYPE html>
<html lang="ar">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحة بسيطة</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      color: #333;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #0066cc;
    }

    p {
      font-size: 18px;
    }

    button {
      background-color: #0066cc;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background-color: #004999;
    }
  </style>
</head>

<body>
  <h1>مرحباً بك في صفحتي</h1>
  <p>هذه صفحة HTML بسيطة تعمل مباشرة في المتصفح.</p>
  <button onclick="alert('تم الضغط على الزر!')">اضغط هنا</button>
</body>

</html>
